<textarea id="readme-src" style="display:none">
  The apps on this website are designed to help make the coding aspect of configs easier.

  The current apps offered at the moment are:

  SCROLLTEST: An app designed to show any input discrepencies in the mouse's scrollwheel.
    - The app scans and processes each scroll tick as it comes in, displaying a constant stream of inputs as cyan or pink ribbons.
    - Scrolling up or down will draw a ribbon. If at any point during the scroll, there is a gap in the ribbon, this indicates an input error.
    
  CHAT BIND GENERATOR: An app designed to help with creating chat binds for CS2.
    - Users are able to stylize text through multiple fonts and choose from a large bank of ASCII emojis that are compatible with the in-game chat window.
    - Enter your desired message into the center text-box and hit Make Bind.
    - Select what key you would like to bind the chat message to and the app will automatically generate a pasteable bind that you can put into your console or autoexec file.

  CS2 CONFIG GENERATOR: An app designed to ease the burden of coding individual autoexec.cfg files featuring every current utility bind in the game.
    - Users are able to select which feature(s) they would like in their config, choosing what key to bind it to.
    - Once a user has made their selection of features, the app allows for either direct copy-paste into a pre-existing autoexec file, or the ability to download a pre-populated autoexec.cfg file.
    - ** NULL BINDS require a seperate .cfg file to accompany the main autoexec. If the nulls feature is selected, the app allows for either direct copy-pasting into a nulls.cfg file, or the ability to download a pre-populated nulls.cfg file.

  IF YOU RUN INTO ANY ISSUES WITH ANY OF THE APPS, PLEASE LET ME KNOW BY EITHER JOINING MY DISCORD OR VIA MY EMAIL: support@moonexe.org

  I'm currently working on several other apps, check back every once in a while to see if they have been added :)

</textarea>
